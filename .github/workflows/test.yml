name: Test Wrapper

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test-wrapper:
    name: Test Wrapper Execution
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Create a deterministic local commit to check diff against
      - name: Create local test commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "test changes" >> test-fixture.txt
          git add test-fixture.txt
          git commit -m "test: local changes for diff validation"

      - name: "Test Match (Expected: true)"
        uses: ./
        id: test-match
        with:
          triggers: "('test-fixture.txt')"
          ref: "HEAD^"

      - name: "Test No Match (Expected: false)"
        uses: ./
        id: test-no-match
        with:
          triggers: "('path/to/nowhere')"
          ref: "HEAD^"

      - name: Verify outputs
        run: |
          echo "Match: ${{ steps.test-match.outputs.triggered }} (expected: true)"
          echo "No-Match: ${{ steps.test-no-match.outputs.triggered }} (expected: false)"

          if [[ "${{ steps.test-match.outputs.triggered }}" != "true" ]]; then
            echo "Error: Wrapper failed to trigger on match"
            exit 1
          fi
          if [[ "${{ steps.test-no-match.outputs.triggered }}" != "false" ]]; then
            echo "Error: Wrapper triggered on no match"
            exit 1
          fi
          echo "Wrapper inputs and outputs verified successfully!"
