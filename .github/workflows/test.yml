name: Test Wrapper

on:
  pull_request:
    paths:
      - '.github/workflows/test.yml'
      - 'action.yml'
  push:
    branches: [main]
    paths:
      - '.github/workflows/test.yml'
      - 'action.yml'

permissions:
  contents: read

jobs:
  test-wrapper:
    name: Test Wrapper Execution
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: "Test Match (Expected: true)"
        uses: ./
        id: test-match
        with:
          triggers: "('.github/workflows/test.yml')"

      - name: "Test No Match (Expected: false)"
        uses: ./
        id: test-no-match
        with:
          triggers: "('path/to/nowhere')"

      - name: "Test Omitted (Expected: true)"
        uses: ./
        id: test-omitted

      - name: Verify outputs
        run: |
          echo "Match: ${{ steps.test-match.outputs.triggered }} (expected: true)"
          echo "No-Match: ${{ steps.test-no-match.outputs.triggered }} (expected: false)"
          echo "Omitted: ${{ steps.test-omitted.outputs.triggered }} (expected: true)"

          if [[ "${{ steps.test-match.outputs.triggered }}" != "true" ]]; then
            echo "Error: Wrapper failed to trigger on match"
            exit 1
          fi
          if [[ "${{ steps.test-no-match.outputs.triggered }}" != "false" ]]; then
            echo "Error: Wrapper triggered on no match"
            exit 1
          fi
          if [[ "${{ steps.test-omitted.outputs.triggered }}" != "true" ]]; then
            echo "Error: Wrapper failed to trigger on omitted"
            exit 1
          fi
          echo "Wrapper inputs and outputs verified successfully!"
