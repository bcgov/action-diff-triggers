name: Diff Triggers
description: "This Action has moved to bcgov/actions/diff-triggers"
branding:
  icon: package
  color: blue

inputs:
  triggers:
    description: Paths used to trigger an event; e.g. ('./backend/' './frontend/'); always trigger if omitted
    required: false
  ref:
    description: Reference to compare against (e.g., 'main', 'HEAD^', commit SHA). Defaults to base repo default branch for PRs, or HEAD^ for non-PR events. Local refs (HEAD^, HEAD~2) work for non-PR events; remote refs (branches, tags, SHAs) work for all events
    required: false
  github_token:
    description: Specify token (GH or PAT), instead of inheriting one from the calling workflow
    default: ${{ github.token }}
  annotations:
    description: Emit workflow summary annotations (`::notice::`) for fired/not fired results. Set to false to suppress annotations
    required: false
    default: 'true'

outputs:
  triggered:
    description: Boolean result of triggers
    value: ${{ steps.diff.outputs.triggered }}

runs:
  using: composite
  steps:
    - name: Migration Warning
      shell: bash
      run: |
        echo "::warning::This Action has moved to bcgov/actions/diff-triggers. Please update your workflow to use bcgov/actions/diff-triggers instead."

    - name: Delegate to consolidated action
      id: diff
      uses: bcgov/actions/diff-triggers@feat/consolidate-diff-triggers
      with:
        triggers: ${{ inputs.triggers }}
        ref: ${{ inputs.ref }}
        github_token: ${{ inputs.github_token }}
        annotations: ${{ inputs.annotations }}
